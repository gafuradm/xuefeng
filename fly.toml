app = 'bailong-api'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_URL = 'postgresql://postgres:RLodMSQa4DDQp6f@bailong-db.flycast:5432/postgres'
  PORT = '8080'
  REDIS_URL = 'redis://default:gQAAAAAAAkqmAAIgcDIwMzk0NGU0OWQ4MTI0NmVkOWE5MTAyMGVjNjkzZDcxZA@moving-leech-150182.upstash.io:6379'

[[services]]
  protocol = 'tcp'
  internal_port = 8080
  processes = ['app']

  [[services.ports]]
    port = 443
    handlers = ['http']
    force_https = true

  [services.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
