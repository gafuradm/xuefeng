<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Teacher - Персональный ИИ учитель</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Universal AI Teacher</h1>
            <p>Персональный ИИ учитель для подготовки к любым экзаменам</p>
            <button id="showTestCreatorBtn" class="btn-secondary" style="position: absolute; top: 20px; right: 20px;" onclick="showTestCreator()">✏️ Свой тест</button>
        </header>

        <main>
            <!-- Шаг 1: Регистрация -->
            <div id="step1" class="step">
                <h2>Начните обучение</h2>
                <div class="form-group">
                    <input type="text" id="userName" placeholder="Ваше имя" required>
                    <input type="email" id="userEmail" placeholder="Email" required>
                    <input type="text" id="examName" placeholder="Что изучаем? (например: математика для гаокао)" required>
                    <button onclick="startLearning()" class="btn-primary">Начать</button>
                </div>
                <div id="errorMessage" style="color: red; margin-top: 10px;"></div>
            </div>

            <!-- Шаг 2: Тестирование -->
            <div id="step2" class="step" style="display:none">
                <h2>📝 Начальное тестирование</h2>
                <div id="testQuestions"></div>
                <button onclick="submitTest()" class="btn-primary">Отправить ответы</button>
            </div>

            <!-- Шаг 3: Результаты теста и время -->
            <div id="step3" class="step" style="display:none">
                <h2>📊 Результаты тестирования</h2>
                <div id="testResults"></div>
                <div class="form-group">
                    <label>Сколько дней у вас есть на подготовку?</label>
                    <input type="number" id="daysAvailable" placeholder="Количество дней">
                    <button onclick="setTimeAndPlan()" class="btn-primary">Создать план</button>
                </div>
            </div>

            <!-- Шаг 4: План обучения -->
            <div id="step4" class="step" style="display:none">
                <h2>📚 Ваш план обучения</h2>
                <div id="studyPlan"></div>
                <button id="startLearningBtn" class="btn-primary">Начать обучение</button>
            </div>

            <!-- Шаг 5: Режим обучения -->
            <div id="step5" class="step" style="display:none">
                <div class="learning-header">
                    <h2>📖 Обучение</h2>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <div id="progressStats"></div>
                </div>
                <div id="lessonContent"></div>
                <div id="testContent" style="display:none"></div>
            </div>

            <!-- Шаг 6: Создание пользовательского теста -->
            <div id="step6" class="step" style="display:none">
                <h2>📝 Создать свой тест</h2>
                <div class="form-group">
                    <label>Название теста:</label>
                    <input type="text" id="customTestName" placeholder="например: Моя контрольная по тригонометрии">
                </div>
                <div class="form-group">
                    <label>Описание (необязательно):</label>
                    <textarea id="customTestDesc" rows="2" placeholder="Краткое описание теста"></textarea>
                </div>
                <div id="questionsList"></div>
                <button onclick="addQuestionField()" class="btn-secondary">➕ Добавить вопрос</button>
                <button onclick="saveCustomTest()" class="btn-primary">💾 Сохранить тест</button>
                <button onclick="trainCustomTest()" class="btn-primary">🤖 Обучить ИИ</button>
                <button onclick="showCustomTestsList()" class="btn-secondary">📋 Мои тесты</button>
                <button onclick="backToMainMenu()" class="btn-secondary">← Главное меню</button>
            </div>

            <!-- Шаг 7: Список пользовательских тестов -->
            <div id="step7" class="step" style="display:none">
                <h2>📋 Мои тесты</h2>
                <div id="customTestsList"></div>
                <button onclick="showTestCreator()" class="btn-secondary">➕ Создать новый</button>
                <button onclick="backToMainMenu()" class="btn-secondary">← Главное меню</button>
            </div>

            <!-- Шаг 8: Прохождение пользовательского теста -->
            <div id="step8" class="step" style="display:none">
                <h2 id="takingTestName"></h2>
                <div id="takingTestQuestions"></div>
                <button onclick="submitCustomTest()" class="btn-primary">Отправить ответы</button>
                <button onclick="showCustomTestsList()" class="btn-secondary">← К списку тестов</button>
            </div>

            <!-- Шаг 9: Результаты пользовательского теста -->
            <div id="step9" class="step" style="display:none">
                <h2>📊 Результаты теста</h2>
                <div id="customTestResults"></div>
                <button onclick="showCustomTestsList()" class="btn-secondary">← К списку тестов</button>
            </div>
        </main>
    </div>

    <script src="/script.js"></script>
</body>
</html>
