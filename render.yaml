services:
  - type: web
    name: bailong-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker -w 1 backend.app.main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bailong-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: bailong-redis
          type: redis
          property: connectionString
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true

  - type: worker
    name: bailong-worker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A backend.app.celery worker --loglevel=info
    envVars:
      - key: REDIS_URL
        fromService:
          name: bailong-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: bailong-db
          property: connectionString
      - key: DEEPSEEK_API_KEY
        sync: false

  - type: web
    name: bailong-conference
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k eventlet -w 1 conference.app:app
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true

  - type: redis
    name: bailong-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: bailong-db
    plan: free
    databaseName: bailong
    user: bailong